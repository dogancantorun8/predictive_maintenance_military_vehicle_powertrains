---
# playbooks/00-bootstrap-scripts.yml
# Renders helper bash scripts from Jinja2 templates in files/scripts/.
#
# Why this exists:
# Operational helper scripts (port-forward-all.sh, future healthcheck
# variants) used to be hand-maintained. Every time a new service was
# added by a playbook, the bash script had to be edited manually,
# causing drift between infrastructure and tooling.
#
# This playbook makes scripts a function of a single source of truth:
# inventory/group_vars/all.yml. Whenever the var list changes, rerun
# this playbook and the scripts regenerate.

- name: Render helper scripts from templates
  hosts: localhost
  connection: local
  become: true
  vars_files:
    - ../inventory/group_vars/all.yml

  vars:
    thesis_repo: "/root/thesis-infra"

  tasks:
    - name: Render port-forward-all.sh from template
      template:
        src: "{{ thesis_repo }}/files/scripts/port-forward-all.sh.j2"
        dest: "{{ thesis_repo }}/scripts/port-forward-all.sh"
        mode: '0755'

    - name: Display rendered script status
      debug:
        msg: |
          Rendered: scripts/port-forward-all.sh
          Services: {{ port_forward_services | length }} total
            kubectl: {{ port_forward_services | selectattr('type', 'equalto', 'kubectl') | list | length }}
            ssh-only: {{ port_forward_services | selectattr('type', 'equalto', 'ssh-only') | list | length }}
