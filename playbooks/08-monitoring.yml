---
# playbooks/08-monitoring.yml
# Installs kube-prometheus-stack (Prometheus + Grafana + Alertmanager)
# in the 'monitoring' namespace.
#
# This is the observability layer of the thesis MLOps stack:
#   - Prometheus scrapes metrics from all namespaces
#   - Grafana visualizes them with pre-built Kubernetes dashboards
#   - Alertmanager fires webhooks on threshold breaches
#     (will be used to trigger KFP retraining on drift)
#
# Evidently CronJob (the drift detector itself) is added in a follow-up step.

- name: Install Prometheus + Grafana + Alertmanager (kube-prometheus-stack)
  hosts: localhost
  connection: local
  become: true
  vars_files:
    - ../inventory/group_vars/all.yml
    - ../inventory/group_vars/vault.yml

  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

  tasks:
    - name: Create monitoring namespace
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ monitoring_namespace }}"
        state: present

    - name: Add prometheus-community Helm repository
      kubernetes.core.helm_repository:
        name: prometheus-community
        repo_url: https://prometheus-community.github.io/helm-charts

    - name: Update Helm repos
      command: /usr/local/bin/helm repo update
      changed_when: false

    - name: Install/upgrade kube-prometheus-stack chart
      kubernetes.core.helm:
        name: prometheus
        chart_ref: prometheus-community/kube-prometheus-stack
        chart_version: "{{ prometheus_stack_version }}"
        release_namespace: "{{ monitoring_namespace }}"
        create_namespace: false
        wait: true
        wait_timeout: 15m
        values_files:
          - "{{ playbook_dir }}/../files/monitoring/kube-prometheus-stack-values.yaml"
        values:
          grafana:
            adminPassword: "{{ vault_grafana_password }}"

    - name: Install prometheus-pushgateway (separate release for CronJob metrics)
      # kube-prometheus-stack does not include pushgateway as a subchart.
      # The Evidently drift-check CronJob (Playbook 12) is a short-lived
      # workload that Prometheus cannot scrape directly — it pushes its
      # metrics to this gateway instead, which Prometheus then scrapes.
      # ServiceMonitor is enabled so kube-prometheus-stack's Prometheus
      # operator auto-discovers it (cluster-wide ServiceMonitor discovery
      # is enabled in kube-prometheus-stack-values.yaml).
      kubernetes.core.helm:
        name: "{{ pushgateway_release_name }}"
        chart_ref: prometheus-community/prometheus-pushgateway
        chart_version: "{{ pushgateway_chart_version }}"
        release_namespace: "{{ monitoring_namespace }}"
        create_namespace: false
        wait: true
        wait_timeout: 5m
        values:
          service:
            type: ClusterIP
            port: 9091
          serviceMonitor:
            enabled: true
            namespace: "{{ monitoring_namespace }}"
          replicaCount: 1
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          # Persist pushed metrics across restarts (small, helps reliability)
          persistentVolume:
            enabled: true
            storageClass: local-path
            size: 1Gi

    - name: Wait for Pushgateway pod to be Ready
      shell: |
        kubectl get pods -n {{ monitoring_namespace }} -l app.kubernetes.io/name=prometheus-pushgateway \
          -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}'
      register: pushgw_ready
      until: pushgw_ready.stdout == "True"
      retries: 30
      delay: 5
      changed_when: false

    - name: Wait for Prometheus pod to be Ready
      shell: |
        kubectl get pods -n {{ monitoring_namespace }} -l app.kubernetes.io/name=prometheus \
          -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}'
      register: prom_ready
      until: prom_ready.stdout == "True"
      retries: 60
      delay: 10
      changed_when: false

    - name: Wait for Grafana pod to be Ready
      shell: |
        kubectl get pods -n {{ monitoring_namespace }} -l app.kubernetes.io/name=grafana \
          -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}'
      register: grafana_ready
      until: grafana_ready.stdout == "True"
      retries: 30
      delay: 10
      changed_when: false

    - name: Count pods in monitoring namespace
      shell: kubectl get pods -n {{ monitoring_namespace }} --no-headers | wc -l
      register: monitoring_pod_count
      changed_when: false

    - name: Display verification info
      debug:
        msg: |
          kube-prometheus-stack {{ prometheus_stack_version }} installed in '{{ monitoring_namespace }}'.
          Pod count: {{ monitoring_pod_count.stdout }} (expect ~7-8)

          Services:
            prometheus-kube-prometheus-prometheus.{{ monitoring_namespace }}.svc.cluster.local:9090
            prometheus-grafana.{{ monitoring_namespace }}.svc.cluster.local:80
            prometheus-kube-prometheus-alertmanager.{{ monitoring_namespace }}.svc.cluster.local:9093

          To access from your laptop:
            ./scripts/port-forward-all.sh restart

          Grafana login:
            user: admin
            password: (from vault.yml — vault_grafana_password)

          Evidently CronJob (drift detector) is added in a separate step.
