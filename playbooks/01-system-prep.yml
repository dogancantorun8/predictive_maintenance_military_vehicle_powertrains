---
# playbooks/01-system-prep.yml
# Prepares the system for Kubernetes: packages, swap off, kernel modules, sysctl, firewall

- name: System preparation for Kubernetes
  hosts: localhost
  connection: local
  become: true
  vars_files:
    - ../inventory/group_vars/all.yml

  tasks:
    # --- 1. System update ---
    - name: Update apt cache and upgrade all packages
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    # --- 2. Essential packages ---
    - name: Install essential packages
      apt:
        name:
          - curl
          - wget
          - git
          - vim
          - tmux
          - htop
          - jq
          - unzip
          - ca-certificates
          - gnupg
          - lsb-release
          - software-properties-common
          - build-essential
          - python3
          - python3-pip
          - python3-venv
          - ufw
        state: present

    # --- 3. Timezone ---
    - name: Set timezone to {{ timezone }}
      timezone:
        name: "{{ timezone }}"

    # --- 4. Disable swap (required by Kubernetes) ---
    - name: Disable swap immediately
      command: swapoff -a
      when: ansible_swaptotal_mb > 0
      changed_when: ansible_swaptotal_mb > 0

    - name: Remove swap entries from /etc/fstab (persistent)
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    # --- 5. Kernel modules ---
    - name: Ensure kernel modules are loaded at boot
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          br_netfilter
          overlay
        mode: '0644'

    - name: Load br_netfilter kernel module now
      modprobe:
        name: br_netfilter
        state: present

    - name: Load overlay kernel module now
      modprobe:
        name: overlay
        state: present

    # --- 6. Sysctl settings for Kubernetes networking ---
    - name: Set sysctl params for Kubernetes networking
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        mode: '0644'

    - name: Apply sysctl params
      command: sysctl --system
      changed_when: false

    # --- 7. Firewall (UFW): only SSH allowed ---
    - name: Allow OpenSSH through UFW
      ufw:
        rule: allow
        name: OpenSSH

    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny

    # --- 8. Verification message ---
    - name: Display verification commands
      debug:
        msg: |
          System prep complete. Verify manually:
            free -h                       # Swap line should be 0B
            lsmod | grep br_netfilter     # br_netfilter should be listed
            sysctl net.ipv4.ip_forward    # should return 1
            ufw status                    # active, OpenSSH ALLOW
