---
# playbooks/12-evidently.yml
# Evidently drift detection — incremental build.
#
# Phase 1 (this commit): generate training-set baseline JSON
# Phase 2: Evidently container image + drift_check.py
# Phase 3: Kubernetes CronJob deployment
# Phase 4: Prometheus integration (drift score metric)
# Phase 5: Alertmanager rule
#
# Each phase adds tasks to this playbook; idempotent — partial runs safe.

- name: Evidently drift detection — incremental deployment
  hosts: localhost
  connection: local
  become: false
  vars_files:
    - ../inventory/group_vars/all.yml
    - ../inventory/group_vars/vault.yml
  vars:
    thesis_repo: "/root/thesis-infra"
    venv_python: "/root/thesis-infra/.venv/bin/python"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

  tasks:
    # ----------------------------------------------------------------
    # Phase 1: Generate training baseline JSON
    # ----------------------------------------------------------------
    - name: Verify training data exists
      stat:
        path: "{{ thesis_repo }}/data/processed/X_train.npy"
      register: x_train_stat

    - name: Fail if training data missing
      fail:
        msg: |
          Training tensors not found at data/processed/X_train.npy.
          Run Notebook 02 (preprocessing) first.
      when: not x_train_stat.stat.exists

    - name: Generate drift detection baseline (training-set prediction distribution)
      command: "{{ venv_python }} scripts/build_drift_baseline.py"
      args:
        chdir: "{{ thesis_repo }}"
      environment:
        # MLflow + MinIO credentials sourced from Ansible Vault — never on disk
        AWS_ACCESS_KEY_ID: "{{ vault_minio_user }}"
        AWS_SECRET_ACCESS_KEY: "{{ vault_minio_password }}"
        AWS_DEFAULT_REGION: us-east-1
        MLFLOW_S3_ENDPOINT_URL: "http://localhost:9000"
        MLFLOW_TRACKING_URI: "http://localhost:5000"
        # PyTorch models are serialized with reference to their original
        # Python import paths (src.model.LSTMRegressor). The drift baseline
        # script must be able to resolve src/ as a Python package — adding
        # the repo root to PYTHONPATH does this. Same pattern as the FastAPI
        # Dockerfile (ENV PYTHONPATH=/home/app:${PYTHONPATH}).
        PYTHONPATH: "{{ thesis_repo }}"
      register: baseline_result
      changed_when: "'Baseline saved to' in baseline_result.stdout"

    - name: Show baseline generation output
      debug:
        var: baseline_result.stdout_lines

    - name: Verify baseline.json was created
      stat:
        path: "{{ thesis_repo }}/data/drift/baseline.json"
      register: baseline_stat

    - name: Fail if baseline.json missing
      fail:
        msg: "Baseline generation succeeded but baseline.json not found"
      when: not baseline_stat.stat.exists

    - name: Display baseline file info
      debug:
        msg: |
          ✓ Baseline file ready: {{ thesis_repo }}/data/drift/baseline.json
            Size: {{ baseline_stat.stat.size }} bytes
            Will be mounted as ConfigMap in Phase 3 (CronJob deployment).

    # ----------------------------------------------------------------
    # Phase 2: Build Evidently drift-check container image
    # ----------------------------------------------------------------
    - name: Check if Evidently image already exists
      command: >
        nerdctl --address /run/k3s/containerd/containerd.sock
        --namespace k8s.io
        images "{{ evidently_image }}"
      register: evidently_image_check
      changed_when: false
      failed_when: false

    - name: Build Evidently drift-check image
      command: >
        nerdctl --address /run/k3s/containerd/containerd.sock
        --namespace k8s.io
        build
        --buildkit-host unix:///run/buildkit/buildkitd.sock
        -t {{ evidently_image }}
        {{ thesis_repo }}/files/evidently/
      register: evidently_build
      changed_when: "'Successfully tagged' in (evidently_build.stdout + evidently_build.stderr)"
      when: "evidently_image_name not in evidently_image_check.stdout"

    - name: Verify Evidently image is available in containerd
      command: >
        nerdctl --address /run/k3s/containerd/containerd.sock
        --namespace k8s.io
        images {{ evidently_image }}
      register: evidently_image_verify
      changed_when: false

    - name: Display image info
      debug:
        msg: |
          ✓ Evidently image ready: {{ evidently_image }}
          {{ evidently_image_verify.stdout }}

    # ----------------------------------------------------------------
    # Phase 3: Deploy Kubernetes resources (ConfigMap + CronJob)
    # ----------------------------------------------------------------
    - name: Ensure monitoring namespace exists
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ evidently_namespace }}"
        state: present

    - name: Apply baseline ConfigMap (mounts baseline.json into CronJob pod)
      # Read the file directly via lookup('file', ...) which always returns
      # the raw string contents. The previous approach (slurp + b64decode)
      # implicitly parsed JSON into a dict in some Ansible versions,
      # breaking the ConfigMap's string-typed `data` field.
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: evidently-baseline
            namespace: "{{ evidently_namespace }}"
            labels:
              app: evidently-drift-check
          data:
            baseline.json: |
              {{ lookup('file', thesis_repo + '/data/drift/baseline.json') | string }}

    - name: Apply Evidently CronJob (hourly drift check)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: batch/v1
          kind: CronJob
          metadata:
            name: evidently-drift-check
            namespace: "{{ evidently_namespace }}"
            labels:
              app: evidently-drift-check
          spec:
            # Run every hour at the top of the hour
            schedule: "0 * * * *"
            concurrencyPolicy: Forbid
            successfulJobsHistoryLimit: 3
            failedJobsHistoryLimit: 3
            jobTemplate:
              spec:
                backoffLimit: 1
                template:
                  metadata:
                    labels:
                      app: evidently-drift-check
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: drift-check
                        image: "{{ evidently_image }}"
                        imagePullPolicy: IfNotPresent
                        env:
                          - name: PROMETHEUS_URL
                            value: "http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090"
                          - name: PUSHGATEWAY_URL
                            value: "http://prometheus-pushgateway.monitoring.svc.cluster.local:9091"
                          - name: ALERTMANAGER_URL
                            value: "http://prometheus-kube-prometheus-alertmanager.monitoring.svc.cluster.local:9093"
                          - name: BASELINE_PATH
                            value: "/etc/baseline/baseline.json"
                          - name: WINDOW
                            value: "1h"
                          - name: PSI_THRESHOLD
                            value: "0.2"
                          - name: KS_PVALUE_THRESHOLD
                            value: "0.05"
                        volumeMounts:
                          - name: baseline
                            mountPath: /etc/baseline
                            readOnly: true
                        resources:
                          requests:
                            cpu: 50m
                            memory: 128Mi
                          limits:
                            cpu: 500m
                            memory: 512Mi
                    volumes:
                      - name: baseline
                        configMap:
                          name: evidently-baseline

    - name: Display deployment info
      debug:
        msg: |
          ✓ Evidently drift detection deployed:
            - Namespace:   {{ evidently_namespace }}
            - ConfigMap:   evidently-baseline (mounted at /etc/baseline/baseline.json)
            - CronJob:     evidently-drift-check (every hour)
            - Image:       {{ evidently_image }}

          Manual run:
            kubectl create job --from=cronjob/evidently-drift-check \
              -n {{ evidently_namespace }} drift-check-manual-$(date +%s)

          View logs:
            kubectl logs -n {{ evidently_namespace }} -l app=evidently-drift-check

