# === General ===
thesis_user: root
timezone: Europe/Berlin

# === k3s ===
k3s_version: v1.30.5+k3s1
k3s_disable: "traefik,servicelb"     # Simplification: we use port-forward instead

# === Storage ===
minio_namespace: minio
minio_storage_size: 50Gi              # CCX23 disk: 160 GB
minio_buckets:
  - thesis-data
  - thesis-mlflow
  - thesis-models

# === KFP Standalone ===
kfp_version: 2.15.0
kfp_namespace: kubeflow

# === MLflow ===
mlflow_version: 2.18.0
mlflow_namespace: mlops

# === Monitoring ===
prometheus_stack_version: 65.0.0
monitoring_namespace: monitoring

# === Versions ===
helm_version: v3.20.2

# === MinIO Helm Chart ===
minio_chart_version: "5.4.0"           # MinIO community chart (https://charts.min.io)
minio_release_name: "minio"

# === PostgreSQL ===
mlops_namespace: mlops
postgres_version: "16"
postgres_image: "postgres:16-alpine"
postgres_storage_size: 10Gi
postgres_user: postgres
postgres_databases:
  - mlflow
  - kfp

# === MLflow ===
mlflow_chart_version: "1.8.1"
mlflow_release_name: "mlflow"
mlflow_bucket: "thesis-mlflow"
mlflow_db_name: "mlflow"
mlflow_db_user: "postgres"

# === Monitoring stack (kube-prometheus-stack) ===
prometheus_stack_version: "85.0.3"
prometheus_retention: "5d"
prometheus_storage_size: 10Gi
grafana_storage_size: 5Gi
alertmanager_storage_size: 2Gi

# === Evidently drift detection (set up after base stack is healthy) ===
evidently_schedule: "0 * * * *"          # hourly
evidently_image: "evidentlyai/evidently:0.4.33"
