monitoring_namespace: monitoring

# === Versions ===
helm_version: v3.20.2

# === MinIO Helm Chart ===
minio_chart_version: "5.4.0"           # MinIO community chart (https://charts.min.io)
minio_release_name: "minio"

# === PostgreSQL ===
mlops_namespace: mlops
postgres_version: "16"
postgres_image: "postgres:16-alpine"
postgres_storage_size: 10Gi
postgres_user: postgres
postgres_databases:
  - mlflow
  - kfp

# === MLflow ===
mlflow_chart_version: "1.8.1"
mlflow_release_name: "mlflow"
mlflow_bucket: "thesis-mlflow"
mlflow_db_name: "mlflow"
mlflow_db_user: "postgres"

# === Monitoring stack (kube-prometheus-stack) ===
prometheus_stack_version: "85.0.3"
prometheus_retention: "5d"
prometheus_storage_size: 10Gi
grafana_storage_size: 5Gi
alertmanager_storage_size: 2Gi

# === Evidently drift detection (set up after base stack is healthy) ===
evidently_schedule: "0 * * * *"          # hourly

# === Python development environment ===
python_version: "3.12"
venv_path: "/root/thesis-infra/.venv"

# === Data (C-MAPSS) ===
cmapss_url: "https://phm-datasets.s3.amazonaws.com/NASA/6.+Turbofan+Engine+Degradation+Simulation+Data+Set.zip"
cmapss_data_dir: "/root/thesis-infra/data/raw/cmapss"
cmapss_zip_sha256: ""                    # Hash check — will fill in after first download

# === DVC ===
dvc_remote_name: "minio-remote"
dvc_remote_url: "s3://thesis-data/dvc"   # Subpath inside thesis-data bucket

# === FastAPI inference service ===
fastapi_image_name: "thesis/fastapi"
fastapi_image_tag: "0.2.2"
fastapi_namespace: "{{ mlops_namespace }}"

# === nerdctl (containerd-native CLI for image build) ===
# Used to build FastAPI image directly against k3s's embedded containerd,
# avoiding a separate Docker daemon. Drop-in replacement for `docker build`.
nerdctl_version: "1.7.7"
nerdctl_arch: "amd64"

# === buildkit (image builder, used by nerdctl) ===
# Ubuntu 22.04 apt does not ship buildkit; we install the prebuilt binary
# from the upstream GitHub release.
buildkit_version: "0.15.2"
buildkit_arch: "amd64"

# === Jupyter Lab (development notebook environment) ===
jupyter_port: 8889                       # 8888 too common, 8889 less crowded
jupyter_venv: "/root/thesis-infra/.venv"
jupyter_config_dir: "/root/.jupyter"
jupyter_notebooks_dir: "/root/thesis-infra/notebooks"


# === Port-forward services (centralized list) ===
# Consumed by scripts/port-forward-all.sh.j2 template.
# Each entry: name, namespace, resource, local_port, remote_port, type
# type 'kubectl'  → uses kubectl port-forward (default)
# type 'ssh-only' → already listening on VM localhost (no kubectl needed)
port_forward_services:
  - name: "MinIO Console"
    namespace: "minio"
    resource: "minio-console"
    local_port: 9001
    remote_port: 9001
    type: "kubectl"
  - name: "MinIO S3 API"
    namespace: "minio"
    resource: "minio"
    local_port: 9000
    remote_port: 9000
    type: "kubectl"
  - name: "Kubeflow Pipelines UI"
    namespace: "kubeflow"
    resource: "ml-pipeline-ui"
    local_port: 8080
    remote_port: 80
    type: "kubectl"
  - name: "MLflow"
    namespace: "mlops"
    resource: "mlflow"
    local_port: 5000
    remote_port: 5000
    type: "kubectl"
  - name: "Grafana"
    namespace: "monitoring"
    resource: "prometheus-grafana"
    local_port: 3000
    remote_port: 80
    type: "kubectl"
  - name: "Prometheus"
    namespace: "monitoring"
    resource: "prometheus-kube-prometheus-prometheus"
    local_port: 9090
    remote_port: 9090
    type: "kubectl"
  - name: "Alertmanager"
    namespace: "monitoring"
    resource: "prometheus-kube-prometheus-alertmanager"
    local_port: 9093
    remote_port: 9093
    type: "kubectl"
  - name: "FastAPI"
    namespace: "mlops"
    resource: "fastapi"
    local_port: 8000
    remote_port: 8000
    type: "kubectl"
  - name: "Jupyter Lab"
    namespace: ""
    resource: ""
    local_port: 8889
    remote_port: 8889
    type: "ssh-only"
# ============================================================
# Evidently drift detection (Playbook 12)
# ============================================================
evidently_namespace: monitoring

# === Prometheus Pushgateway (Playbook 08 — for CronJob metrics) ===
# kube-prometheus-stack does not include pushgateway as a subchart;
# it is installed as a separate Helm release. Required by Evidently
# drift-check CronJob (Playbook 12) to push metrics from short-lived
# pods that Prometheus cannot scrape directly.
pushgateway_chart_version: "2.15.0"
pushgateway_release_name: prometheus-pushgateway
evidently_image_name: "thesis/evidently-drift"
evidently_image_tag: "0.1.1"
evidently_image: "{{ evidently_image_name }}:{{ evidently_image_tag }}"
